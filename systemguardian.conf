[general]
# Absolute path to the log file used by SystemGuardian.
log_file = /var/log/systemguardian/systemguardian.log
# Maximum log file size before rotation (in bytes).
log_max_bytes = 2097152
# Number of rotated log files to keep.
log_backup_count = 7
# Logging level (DEBUG, INFO, WARNING, ERROR, CRITICAL).
log_level = INFO
# Maximum allowed age (in hours) for a valid Timeshift snapshot when required.
timeshift_snapshot_max_age_hours = 24

[features]
# Toggle individual capabilities on or off.
enable_update = true
enable_cleanup = true
enable_health_checks = true
enable_service_checks = true
enable_firewall_check = true
enable_smart_checks = true
enable_kernel_cleanup = false
enable_docker_prune = false
# When enabled, SystemGuardian warns if no recent Timeshift snapshot is available.
require_timeshift_snapshot = false

[cleanup]
# Remove unused package caches when supported by the package manager.
clean_package_cache = true
# Number of days of systemd journal logs to retain (0 disables journal cleanup).
journal_vacuum_days = 14
# Additional flags to append to `docker system prune` when Docker cleanup is enabled.
docker_prune_flags = 

[services]
# Comma-separated list of critical systemd services to verify are active during health checks.
critical_services = sshd,cron

[processes]
# Comma-separated list of process name patterns to terminate before cleanup.
kill_list = 

[health]
# Preferred firewall utility to check (auto, ufw, firewalld).
firewall_tool = auto

[package_manager]
# Package-manager specific overrides.
apt_upgrade_command = full-upgrade
dnf_upgrade_command = upgrade
